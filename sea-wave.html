<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Wave Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 20px 24px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      z-index: 10;
      min-width: 240px;
      background: rgba(0,0,0,0.25);
      color: #ecf0f1;
    }

    .controls h2 { font-size: 16px; margin-bottom: 16px; letter-spacing: 0.5px; }
    .control-group { margin-bottom: 14px; }
    .control-group label {
      display: flex; justify-content: space-between;
      font-size: 13px; margin-bottom: 6px; font-weight: 500;
    }
    .control-group label span { opacity: 0.7; font-weight: 400; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.3); cursor: pointer;
    }

    .speed-slider { background: linear-gradient(90deg, #74b9ff, #0984e3); }
    .daytime-slider { background: linear-gradient(90deg, #2d3436, #fdcb6e, #74b9ff); }
    .wavelength-slider { background: linear-gradient(90deg, #55efc4, #00b894); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="controls" id="controls">
    <h2>Wave Controls</h2>
    <div class="control-group">
      <label>Speed <span id="speedVal">5</span></label>
      <input type="range" class="speed-slider" id="speed" min="1" max="10" value="5">
    </div>
    <div class="control-group">
      <label>Daytime <span id="daytimeVal">75%</span></label>
      <input type="range" class="daytime-slider" id="daytime" min="0" max="100" value="75">
    </div>
    <div class="control-group">
      <label>Wavelength <span id="wavelengthVal">5</span></label>
      <input type="range" class="wavelength-slider" id="wavelength" min="2" max="12" value="5">
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W, H, horizonY;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      horizonY = H * 0.40;
    }
    resize();
    window.addEventListener('resize', resize);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpC(a, b, t) { return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)]; }
    function rgb(c) { return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }
    function rgba(c, a) { return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

    const palette = {
      night:  { skyTop:[8,10,28], skyBot:[18,22,50], sunCol:[200,210,230], sunGlow:[80,90,120],
                water:[ [18,28,60],[14,22,52],[10,18,45],[8,14,38],[6,10,30] ],
                foam:[80,100,140], spec:[140,160,200] },
      sunset: { skyTop:[50,20,70], skyBot:[255,110,50], sunCol:[255,130,30], sunGlow:[255,80,20],
                water:[ [60,50,80],[50,42,72],[42,36,64],[35,30,55],[28,24,46] ],
                foam:[200,160,130], spec:[255,190,110] },
      day:    { skyTop:[65,155,255], skyBot:[155,210,255], sunCol:[255,250,150], sunGlow:[255,230,100],
                water:[ [30,130,210],[22,110,195],[16,90,175],[10,72,155],[6,55,130] ],
                foam:[220,240,255], spec:[255,255,245] },
    };

    function getTheme(t) {
      const r = {};
      const keys = ['skyTop','skyBot','sunCol','sunGlow','foam','spec'];
      for (const k of keys) {
        if (t < 0.35) r[k] = lerpC(palette.night[k], palette.sunset[k], t / 0.35);
        else r[k] = lerpC(palette.sunset[k], palette.day[k], (t - 0.35) / 0.65);
      }
      r.water = [];
      for (let i = 0; i < 5; i++) {
        if (t < 0.35) r.water[i] = lerpC(palette.night.water[i], palette.sunset.water[i], t / 0.35);
        else r.water[i] = lerpC(palette.sunset.water[i], palette.day.water[i], (t - 0.35) / 0.65);
      }
      return r;
    }

    // Stars
    const stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({ x: Math.random(), y: Math.random() * 0.40, s: Math.random() * 2 + 0.5, p: Math.random() * 6.28 });
    }

    // Wave layers config (back to front)
    const layers = [
      { yBase: 0.00, amp: 14, freqMul: 1.0,  speedMul: 0.5,  colorIdx: 0 },
      { yBase: 0.12, amp: 18, freqMul: 0.9,  speedMul: 0.65, colorIdx: 1 },
      { yBase: 0.26, amp: 22, freqMul: 0.85, speedMul: 0.8,  colorIdx: 1 },
      { yBase: 0.40, amp: 26, freqMul: 0.8,  speedMul: 0.9,  colorIdx: 2 },
      { yBase: 0.52, amp: 30, freqMul: 0.75, speedMul: 1.0,  colorIdx: 2 },
      { yBase: 0.63, amp: 34, freqMul: 0.7,  speedMul: 1.1,  colorIdx: 3 },
      { yBase: 0.74, amp: 38, freqMul: 0.65, speedMul: 1.2,  colorIdx: 3 },
      { yBase: 0.85, amp: 42, freqMul: 0.6,  speedMul: 1.35, colorIdx: 4 },
    ];

    function calcWaveY(x, time, layer, wl, spd) {
      const freq = (2 * Math.PI) / (wl * layer.freqMul);
      const s = spd * layer.speedMul;
      const phaseOffset = layer.yBase * 17;
      let y = 0;
      y += Math.sin(x * freq + time * s + phaseOffset) * layer.amp;
      y += Math.sin(x * freq * 2.1 + time * s * 1.3 + phaseOffset + 1.5) * layer.amp * 0.3;
      y += Math.sin(x * freq * 0.6 + time * s * 0.7 + phaseOffset + 3.0) * layer.amp * 0.5;
      return y;
    }

    function drawSky(th, t, time) {
      const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
      grad.addColorStop(0, rgb(th.skyTop));
      grad.addColorStop(1, rgb(th.skyBot));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, horizonY + 2);

      // Stars
      if (t < 0.5) {
        const a = t < 0.3 ? 1 : 1 - (t - 0.3) / 0.2;
        for (const s of stars) {
          ctx.globalAlpha = a * (0.4 + 0.6 * Math.sin(time * 1.2 + s.p));
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, s.s, 0, 6.28);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Sun/moon glow
      const sx = W * 0.5, sy = horizonY * 0.35;
      const grd = ctx.createRadialGradient(sx, sy, 10, sx, sy, 150);
      grd.addColorStop(0, rgba(th.sunGlow, 0.5));
      grd.addColorStop(0.5, rgba(th.sunGlow, 0.1));
      grd.addColorStop(1, rgba(th.sunGlow, 0));
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(sx, sy, 150, 0, 6.28);
      ctx.fill();

      // Sun/moon disc
      const dg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 32);
      dg.addColorStop(0, rgba(th.sunCol, 1));
      dg.addColorStop(1, rgba(th.sunCol, 0.85));
      ctx.fillStyle = dg;
      ctx.beginPath();
      ctx.arc(sx, sy, 32, 0, 6.28);
      ctx.fill();
    }

    function drawOcean(th, t, time, speed, wavelength) {
      const oceanH = H - horizonY;
      const step = 3;

      for (let li = 0; li < layers.length; li++) {
        const L = layers[li];
        const baseY = horizonY + oceanH * L.yBase;
        const col = th.water[L.colorIdx];

        // Darker shade for body below the crest
        const bodyCol = lerpC(col, [0, 0, 0], 0.15);

        // Draw wave shape
        ctx.beginPath();
        ctx.moveTo(-10, H + 10);
        ctx.lineTo(-10, baseY);

        const pts = [];
        for (let x = -10; x <= W + 10; x += step) {
          const wy = calcWaveY(x, time, L, wavelength, speed);
          const py = baseY + wy;
          pts.push({ x, y: py, wy });
          ctx.lineTo(x, py);
        }

        ctx.lineTo(W + 10, H + 10);
        ctx.closePath();

        // Gradient fill from crest color to darker body
        const grd = ctx.createLinearGradient(0, baseY - L.amp, 0, baseY + L.amp + oceanH * 0.15);
        grd.addColorStop(0, rgb(col));
        grd.addColorStop(0.4, rgb(col));
        grd.addColorStop(1, rgb(bodyCol));
        ctx.fillStyle = grd;
        ctx.fill();

        // Specular highlights on crests
        for (let i = 1; i < pts.length - 1; i++) {
          const p = pts[i];
          const prev = pts[i - 1];
          const next = pts[i + 1];

          // Crest detection: point lower (higher on screen) than neighbors
          if (p.wy < prev.wy && p.wy < next.wy && p.wy < -L.amp * 0.2) {
            const intensity = Math.min(1, (-p.wy - L.amp * 0.2) / (L.amp * 0.6));
            const highlightW = wavelength * 0.15;

            const sg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, highlightW);
            sg.addColorStop(0, rgba(th.spec, intensity * 0.35));
            sg.addColorStop(1, rgba(th.spec, 0));
            ctx.fillStyle = sg;
            ctx.fillRect(p.x - highlightW, p.y - 3, highlightW * 2, 6);
          }
        }

        // Foam on front layers
        if (li >= 4) {
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(-10, H + 10);
          ctx.lineTo(-10, baseY - L.amp);
          for (const p of pts) ctx.lineTo(p.x, p.y);
          ctx.lineTo(W + 10, H + 10);
          ctx.closePath();
          ctx.clip();

          for (let i = 1; i < pts.length - 1; i++) {
            const p = pts[i];
            const slope = (pts[i + 1].wy - pts[i - 1].wy) / (step * 2);

            // Foam on forward-facing slopes near crests
            if (p.wy < -L.amp * 0.1 && slope > 0.05) {
              const foamStr = Math.min(1, slope * 5) * Math.min(1, (-p.wy) / (L.amp * 0.4));
              ctx.fillStyle = rgba(th.foam, foamStr * 0.5);
              ctx.fillRect(p.x - 1, p.y - 1, step + 2, 4);
            }

            // Thin white line right at the crest
            if (p.wy < pts[i - 1].wy && p.wy < pts[i + 1].wy && p.wy < -L.amp * 0.3) {
              ctx.strokeStyle = rgba(th.foam, 0.6);
              ctx.lineWidth = 1.5;
              const startIdx = Math.max(0, i - 6);
              const endIdx = Math.min(pts.length - 1, i + 6);
              ctx.beginPath();
              ctx.moveTo(pts[startIdx].x, pts[startIdx].y);
              for (let j = startIdx + 1; j <= endIdx; j++) ctx.lineTo(pts[j].x, pts[j].y);
              ctx.stroke();
            }
          }
          ctx.restore();
        }
      }

      // Sun reflection on water
      const refX = W * 0.5;
      const refLen = Math.min(oceanH * 0.6, 250);
      for (let y = horizonY; y < horizonY + refLen; y += 2) {
        const d = (y - horizonY) / refLen;
        const shimmer = Math.sin(y * 0.12 + time * 2.5) * (10 + d * 20);
        const w = 4 + d * 60;
        const a = (1 - d) * (t < 0.2 ? 0.12 : 0.22);
        ctx.fillStyle = rgba(th.spec, a);
        ctx.fillRect(refX - w / 2 + shimmer, y, w, 2);
      }
    }

    let time = 0;

    function render() {
      const speed = parseInt(document.getElementById('speed').value);
      const daytime = parseInt(document.getElementById('daytime').value) / 100;
      const wlVal = parseInt(document.getElementById('wavelength').value);
      const wavelength = 80 + wlVal * 35;

      document.getElementById('speedVal').textContent = speed;
      document.getElementById('daytimeVal').textContent = (daytime * 100 | 0) + '%';
      document.getElementById('wavelengthVal').textContent = wlVal;

      const th = getTheme(daytime);

      ctx.clearRect(0, 0, W, H);
      drawSky(th, daytime, time);
      drawOcean(th, daytime, time, speed * 0.5, wavelength);

      const isDark = daytime < 0.4;
      const ctrl = document.getElementById('controls');
      ctrl.style.background = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.2)';
      ctrl.style.color = '#ecf0f1';

      time += 0.025;
      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
